services:
  postgres:
    image: postgres:16-alpine
    container_name: pokesignal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pokesignal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pokesignal-postgres:/var/lib/postgresql/data

volumes:
  pokesignal-postgres:
